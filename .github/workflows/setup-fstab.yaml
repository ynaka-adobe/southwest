name: Setup fstab for new repo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fstab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update fstab.yaml with this repo's org and name
        run: |
          ORG="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          EXPECTED="https://content.da.live/$ORG/$REPO/"
          CURRENT=$(grep -o 'https://content\.da\.live/[^/]*/[^/]*/' fstab.yaml || true)
          if [ "$CURRENT" = "$EXPECTED" ]; then
            echo "fstab.yaml already up to date — nothing to do."
            exit 0
          fi
          sed -i "s|https://content\.da\.live/[^/]*/[^/]*/|$EXPECTED|g" fstab.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fstab.yaml
          git commit -m "chore: set fstab.yaml for $ORG/$REPO"
          git pull --rebase
          git push
